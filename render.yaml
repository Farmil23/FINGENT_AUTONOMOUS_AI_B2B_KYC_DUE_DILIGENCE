services:
  - type: web
    name: finagent
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8000
      - key: DOKU_CLIENT_ID
        sync: false
      - key: DOKU_SECRET_KEY
        sync: false
      - key: DOKU_BASE_URL
        value: https://api-sandbox.doku.com
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: NEO4J_DATABASE
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
